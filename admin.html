<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>元启漫剧 管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei","PingFang SC",sans-serif}
body{background:#f5f7fa;padding:20px}
.login{max-width:400px;margin:50px auto;background:#fff;padding:30px;border-radius:12px}
.login h3{text-align:center;margin-bottom:20px}
.login input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px}
.login button{width:100%;padding:12px;background:#27ae60;color:#fff;border:none;border-radius:6px;margin-top:10px;cursor:pointer}
.main{display:none;max-width:1200px;margin:0 auto}
.table-box{background:#fff;padding:20px;border-radius:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:10px;text-align:center;font-size:14px}
th{background:#f8f9fa}
.export{padding:10px 20px;background:#27ae60;color:#fff;border:none;border-radius:6px;margin:20px 0;cursor:pointer}
</style>
</head>
<body>

<div class="login" id="loginBox">
  <h3>管理员登录</h3>
  <input id="user" placeholder="账号">
  <input id="pwd" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
</div>

<div class="main" id="main">
  <button class="export" onclick="exportData()">导出Excel</button>
  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>序号</th><th>剧名</th><th>集数</th><th>时长(分)</th><th>男主</th><th>女主</th><th>网盘链接</th><th>提交时间</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<script>
function login() {
  const u = document.getElementById('user').value;
  const p = document.getElementById('pwd').value;
  if (u === 'yuanqi2026' && p === 'yuanqi2026') {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    loadData();
  } else {
    alert('账号或密码错误');
  }
}

function loadData() {
  fetch('https://script.google.com/macros/s/AKfycbwXcQ8Z0X7H6kZJZk8Z0X7H6kZJZk8Z0X7H6kZJZk8/exec?list=1')
    .then(res => res.json())
    .then(data => {
      let html = '';
      data.forEach((item, i) => {
        html += `<tr>
          <td>${i+1}</td>
          <td>${item.dramaName}</td>
          <td>${item.totalEpisodes}</td>
          <td>${item.totalDuration}</td>
          <td>${item.maleLeadName}</td>
          <td>${item.femaleLeadName}</td>
          <td><a href="${item.netdiskLink}" target="_blank">打开</a></td>
          <td>${item.submitTime}</td>
        </tr>`;
      });
      document.getElementById('list').innerHTML = html;
    });
}

function exportData() {
  fetch('https://script.google.com/macros/s/AKfycbwXcQ8Z0X7H6kZJZk8Z0X7H6kZJZk8Z0X7H6kZJZk8/exec?export=1')
    .then(res => res.blob())
    .then(blob => {
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '元启漫剧投稿数据.csv';
      a.click();
      window.URL.revokeObjectURL(url);
    });
}
</script>
</body>
</html>
