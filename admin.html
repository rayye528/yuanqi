<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Microsoft YaHei,sans-serif}
body{background:#f5f7fa;padding:20px}
.login{max-width:400px;margin:50px auto;background:#fff;padding:30px;border-radius:12px}
.login h3{margin-bottom:20px;text-align:center}
.login input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px}
.login button{width:100%;padding:12px;background:#27ae60;color:#fff;border:none;border-radius:6px;margin-top:10px}
.main{display:none;max-width:1200px;margin:0 auto}
.table-box{background:#fff;padding:20px;border-radius:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#f8f9fa}
.export{padding:10px 20px;background:#27ae60;color:#fff;border:none;border-radius:6px;margin:20px 0}
</style>
</head>
<body>
<div class="login" id="loginBox">
  <h3>管理员登录</h3>
  <input id="user" placeholder="账号">
  <input id="pwd" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
</div>
<div class="main" id="main">
  <button class="export" onclick="exportData()">导出Excel</button>
  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>序号</th><th>剧名</th><th>集数</th><th>时长</th><th>男主</th><th>女主</th><th>网盘链接</th><th>时间</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<script>
const API_LIST = "https://yuanqi.pages.dev/api/list";
let allData = [];

async function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pwd").value;
  if (u === "yuanqi2026" && p === "yuanqi2026") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("main").style.display = "block";
    await loadData();
  } else {
    alert("账号或密码错误");
  }
}

async function loadData() {
  const res = await fetch(API_LIST);
  allData = await res.json();
  let html = "";
  allData.forEach((item, i) => {
    html += `
    <tr>
      <td>${i+1}</td>
      <td>${item.dramaName}</td>
      <td>${item.totalEpisodes}</td>
      <td>${item.totalDuration}</td>
      <td>${item.maleLeadName}</td>
      <td>${item.femaleLeadName}</td>
      <td><a href="${item.netdiskLink}" target="_blank">打开</a></td>
      <td>${item.submitTime}</td>
    </tr>`;
  });
  document.getElementById("list").innerHTML = html;
}

function exportData() {
  let csv = "序号,剧名,集数,时长,男主,女主,网盘链接,提交时间\n";
  allData.forEach((item, i) => {
    csv += `${i+1},${item.dramaName},${item.totalEpisodes},${item.totalDuration},${item.maleLeadName},${item.femaleLeadName},${item.netdiskLink},${item.submitTime}\n`;
  });
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "投稿数据.csv";
  a.click();
}
</script>
</body>
</html>
